name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1 : Build (accède aux secrets de l'environnement "prod") ────────────
  build:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Vérification du build
        run: |
          echo "=== dist/ ===" && ls -la dist/
          echo "=== dist/assets/ ===" && ls -la dist/assets/
          # Échoue immédiatement si le dossier assets/ est vide
          ASSET_COUNT=$(ls dist/assets/ | wc -l | tr -d ' ')
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "❌ dist/assets/ est vide — le build a échoué silencieusement"
            exit 1
          fi
          echo "✅ $ASSET_COUNT fichiers dans dist/assets/"
          touch dist/.nojekyll
          echo "✅ .nojekyll créé"

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Job 2 : Deploy (environnement "github-pages" requis par GitHub) ────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

